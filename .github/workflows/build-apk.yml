name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev \
          automake ant ccache

    - name: Install buildozer and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        pip install -r requirements.txt

    - name: Fix buildozer.spec
      run: |
        # 如果存在重复的 presplash.filename，删除重复行
        if [ -f "buildozer.spec" ]; then
          # 删除重复的 presplash.filename 行（保留第一个）
          awk '!seen[$0]++ || !/presplash\.filename/' buildozer.spec > buildozer.spec.tmp
          mv buildozer.spec.tmp buildozer.spec
          
          # 或者直接使用下面的配置
          cat > buildozer.spec << 'EOF'
[app]

title = ATSC钱包
package.name = atscwallet
package.domain = org.atsc.client

version = 10.12
version.release = 10.12

description = ATSC区块链客户端钱包
author = ATSC Team

source.dir = .
source.include_exts = py,png,jpg,kv,atlas,ttf,txt,json
source.exclude_exts = spec
source.exclude_dirs = tests, bin, .git, __pycache__, .buildozer

# icon.filename = %(source.dir)s/icon.png
# presplash.filename = %(source.dir)s/splash.png

android.archs = arm64-v8a, armeabi-v7a

android.api = 30
android.minapi = 21
android.ndk = 23b
android.sdk = 30

android.permissions = INTERNET, ACCESS_NETWORK_STATE, ACCESS_WIFI_STATE, WRITE_EXTERNAL_STORAGE, READ_EXTERNAL_STORAGE

requirements = python3,kivy==2.1.0,requests==2.31.0,websocket-client==1.6.4,pillow==10.1.0

log_level = 2

orientation = portrait
fullscreen = 0

android.enable_androidx = True
android.gradle_dependencies = 'androidx.appcompat:appcompat:1.3.1'
EOF
        fi

    - name: Build APK with Buildozer
      run: |
        buildozer -v android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: ATSC-Wallet-v10.12
        path: bin/*.apk
        retention-days: 30

    - name: Upload debug info (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-log
        path: .buildozer/logs/
        retention-days: 7
