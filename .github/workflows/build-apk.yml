name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev \
          automake ant ccache \
          wget curl

    - name: Install buildozer and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        pip install -r requirements.txt

    - name: Accept Android SDK licenses
      run: |
        # 创建目录
        mkdir -p ~/.android
        # 自动接受所有许可证
        yes | sdkmanager --licenses || true
        # 或者手动创建许可证文件
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.android/repositories.cfg
        # 设置许可证
        mkdir -p ~/.android/licenses
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.android/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.android/licenses/android-sdk-preview-license
        echo "d975f751698a77b662f1254ddbeed3901e976f5a" > ~/.android/licenses/intel-android-extra-license
        echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > ~/.android/licenses/google-gdk-license
        echo "e9acab5b5fbb560a72cfaecce8946896ff6a94c9" > ~/.android/licenses/mips-android-sysimage-license

    - name: Create minimal buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
[app]

title = ATSC钱包
package.name = atscwallet
package.domain = org.atsc.client

version = 10.12
version.release = 10.12

description = ATSC区块链客户端钱包
author = ATSC Team

source.dir = .
source.include_exts = py,png,jpg,kv,atlas,ttf,txt,json

# 不使用图标和启动画面
# icon.filename = 
# presplash.filename = 

android.archs = arm64-v8a, armeabi-v7a

android.api = 30
android.minapi = 21
android.ndk = 25b
android.sdk = 30

android.permissions = INTERNET, ACCESS_NETWORK_STATE, ACCESS_WIFI_STATE, WRITE_EXTERNAL_STORAGE, READ_EXTERNAL_STORAGE

requirements = python3,kivy==2.1.0,requests==2.31.0,websocket-client==1.5.1

log_level = 2

orientation = portrait
fullscreen = 0

android.enable_androidx = True
android.gradle_dependencies = 'androidx.appcompat:appcompat:1.3.1'

# 自动接受许可证
android.accept_sdk_license = True
EOF

    - name: Build APK with Buildozer
      run: |
        # 设置环境变量自动接受许可证
        export ANDROID_SDK_ROOT=/home/runner/.buildozer/android/platform/android-sdk
        export PATH=$ANDROID_SDK_ROOT/tools/bin:$PATH
        
        # 初始化buildozer（如果需要）
        if [ ! -f .buildozer/default.spec ]; then
          buildozer init
        fi
        
        # 开始构建
        buildozer -v android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: ATSC-Wallet-v10.12
        path: bin/*.apk
        retention-days: 30

    - name: Upload debug info (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-log
        path: .buildozer/logs/
        retention-days: 7
